name: Fund Monitor

on:
  schedule:
    - cron: '0 0 10 * *'  # 매월 10일 00:00 UTC (한국 09:00)
    - cron: '0 0 11 * *'  # 매월 11일 00:00 UTC
    - cron: '0 0 12 * *'  # 매월 12일 00:00 UTC
    - cron: '0 0 13 * *'  # 매월 13일 00:00 UTC
    - cron: '0 0 14 * *'  # 매월 14일 00:00 UTC

jobs:
  fund-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run fund monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python fund_monitor.py
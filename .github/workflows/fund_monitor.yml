name: Fund Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 10 * *'
    - cron: '0 0 11 * *'
    - cron: '0 0 12 * *'
    - cron: '0 0 13 * *'
    - cron: '0 0 14 * *'

jobs:
  fund-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium schedule python-telegram-bot APScheduler pytz webdriver-manager
      
      - name: Run fund monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python fund_monitor.py